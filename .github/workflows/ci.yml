name: CI/CD Pipeline - Instaladores

on:
  push:
    branches: [ "main", "staging", "develop" ]
  pull_request:
    branches: [ "main", "staging", "develop" ]

jobs:
  test-installers:
    name: Probar Instalador en ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Probamos en máquinas vírgenes de Ubuntu (Linux) y Windows Server
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Probar script de Linux (bash)
        if: runner.os == 'Linux'
        # Capturamos la salida y verificamos que realmente llegó al paso del PIN.
        run: |
          timeout 20 bash Minecraft-Server-Manager-Web/public/install.sh > install.log 2>&1 || true
          if grep -q "PIN de seguridad" install.log; then
            echo "✅ ¡Instalador funcionó y el PIN fue generado exitosamente!"
            exit 0
          else
            echo "❌ El instalador falló o se colgó antes de dar el PIN. Logs:"
            cat install.log
            exit 1
          fi

      - name: Probar script de Windows (PowerShell)
        if: runner.os == 'Windows'
        # Guardamos la salida y buscamos el texto del PIN para asegurar el éxito.
        run: |
          $job = Start-Job -ScriptBlock { 
            & .\Minecraft-Server-Manager-Web\public\install.ps1 
          }
          Wait-Job $job -Timeout 30
          $logs = Receive-Job $job
          Stop-Job $job
          
          if ($logs -match "PIN de seguridad") {
            Write-Host "✅ ¡Instalador funcionó perfectamente y el PIN fue generado exitosamente!"
            $logs | Write-Host
            exit 0
          } else {
            Write-Error "❌ El instalador falló o se colgó antes de dar el PIN. Logs:"
            $logs | Write-Host
            exit 1
          }
