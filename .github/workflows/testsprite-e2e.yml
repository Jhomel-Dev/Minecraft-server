name: TestSprite E2E QA

on:
  pull_request:
    branches: [ "main" ]

jobs:
  testsprite-qa:
    name: Run TestSprite QA Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger TestSprite AI Tests
        env:
          TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
        run: |
          echo "🚀 Iniciando suite de pruebas en TestSprite..."
          if [ -z "$TESTSPRITE_API_KEY" ]; then
            echo "❌ ERROR: TESTSPRITE_API_KEY no está configurada en los secretos de GitHub."
            exit 1
          fi
          
          # Aquí TestSprite se encargará de ejecutar el set de pruebas en la nube
          # y reportar el estado de vuelta a GitHub Actions.
          curl -X POST "https://api.testsprite.com/v1/runs" \
            -H "Authorization: Bearer $TESTSPRITE_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "project": "CraftControl-frontend",
              "environment": "staging",
              "trigger": "github_actions"
            }'
          
          echo "✅ Pruebas enviadas a TestSprite exitosamente."
