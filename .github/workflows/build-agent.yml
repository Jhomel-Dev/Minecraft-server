name: CD Pipeline - Empaquetado del Agente

on:
  push:
    branches:
      - main
    paths:
      - 'Minecraft-Server-Manager-LocalAgent/**'
      - 'Minecraft-Server-Manager-AgentGUI/**'

permissions:
  contents: write

jobs:
  build-gui:
    name: Construir GUI (${{ matrix.platform }})
    strategy:
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar dependencias de Linux (Tauri)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compilar Motor CLI (Node.js pkg)
        run: |
          cd Minecraft-Server-Manager-LocalAgent
          npm install
          npm run build
          npm run compile

      - name: Preparar Sidecar
        shell: bash
        run: |
          mkdir -p Minecraft-Server-Manager-AgentGUI/src-tauri/bin
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cp Minecraft-Server-Manager-LocalAgent/bin/agent-win.exe Minecraft-Server-Manager-AgentGUI/src-tauri/bin/agentcore-x86_64-pc-windows-msvc.exe
          else
            cp Minecraft-Server-Manager-LocalAgent/bin/agent-linux Minecraft-Server-Manager-AgentGUI/src-tauri/bin/agentcore-x86_64-unknown-linux-gnu
          fi

      - name: Instalar dependencias GUI
        run: |
          cd Minecraft-Server-Manager-AgentGUI
          npm install

      - name: Compilar Tauri App y Subir a GitHub Releases
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "Minecraft-Server-Manager-AgentGUI"
          tagName: release/v2.0.0
          releaseName: "CraftControl Agent Release v2.0.0"
          releaseBody: "Instaladores automáticos del Agente Gráfico"
          releaseDraft: false
          prerelease: false
