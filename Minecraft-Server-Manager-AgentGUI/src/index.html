<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraftControl Agent</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>CraftControl</h1>
    
    <div id="view-loading">
      <div class="spinner"></div>
      <div class="status">Buscando motor de sincronización...</div>
    </div>

    <div id="view-pin">
      <div class="status">Ingresa este PIN en la web para vincular:</div>
      <div class="pin-box" id="pin-display">------</div>
      <button class="btn" id="btn-copy">Copiar PIN</button>
    </div>

    <div id="view-active">
      <div class="status" style="color: var(--success); font-weight: bold;">
        Agente conectado y funcionando en segundo plano.
      </div>
      <button class="btn btn-secondary" id="btn-unlink">Desvincular Cuenta</button>
      <button class="btn" id="btn-shutdown">Apagar Agente y Servidores</button>
    </div>

    <div id="view-shutdown">
      <div class="spinner"></div>
      <div class="status" style="color: var(--danger);">
        Guardando mundos y apagando servidores...
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
